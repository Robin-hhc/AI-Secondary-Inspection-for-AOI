# 系统配置文件模板
system:
  # 数据库配置
  database:
    path: "./data/aoi_system.db"
    pool_size: 10
    echo: false

  # 存储配置
  storage:
    image_root: "./data/images"
    model_root: "./data/models"
    feature_lib_root: "./data/feature_libs"
    max_storage_gb: 500
    cleanup_days: 90

  # 日志配置
  logging:
    level: "INFO"
    file: "./logs/aoi_system.log"
    rotation: "100 MB"
    retention: "30 days"

# 推理引擎配置
inference:
  # 模型配置
  model:
    backbone: "wide_resnet50"
    input_size: [256, 256]
    feature_dim: 512
    onnx_path: "./models/feature_extractor.onnx"
    tensorrt_engine: "./models/feature_extractor.engine"

  # FAISS配置
  faiss:
    index_type: "IVF"
    nlist: 100
    nprobe: 10
    use_gpu: false

  # 判定配置
  threshold:
    anomaly_threshold: 0.5
    uncertainty_margin: 0.1
    min_confidence: 0.7

  # 性能配置
  performance:
    batch_size: 16
    num_threads: 4
    gpu_id: 0

# 图像采集配置
collector:
  # 监控配置
  watch:
    paths:
      - "\\\\server\\aoi\\output"
    file_patterns:
      - "*.jpg"
      - "*.png"
    check_interval: 1.0

  # 预处理配置
  preprocessing:
    target_size: [256, 256]
    normalize_mean: [0.485, 0.456, 0.406]
    normalize_std: [0.229, 0.224, 0.225]
    enhance: false

# 主动学习配置
active_learning:
  # 采样配置
  sampling:
    strategy: "uncertainty"
    max_samples: 100
    diversity_threshold: 0.3
    min_uncertainty: 0.1

  # 队列配置
  queue:
    max_size: 1000
    priority_levels: 3

  # 监控配置
  monitor:
    metrics_window: 100
    alert_threshold: 0.85

# 模型更新配置
model_updater:
  # 更新触发条件
  trigger:
    min_samples: 50
    time_interval: 86400  # 24小时
    accuracy_drop: 0.05

  # 版本管理
  version:
    max_versions: 10
    auto_rollback: true
    rollback_threshold: 0.1

  # 更新策略
  strategy:
    type: "incremental"
    rebuild_threshold: 1000

# Web服务配置
web:
  # 后端配置
  backend:
    host: "0.0.0.0"
    port: 5000
    debug: false
    secret_key: "your-secret-key-here"

  # JWT配置
  jwt:
    algorithm: "HS256"
    access_token_expires: 3600
    refresh_token_expires: 86400

  # CORS配置
  cors:
    origins:
      - "http://localhost:3000"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
    allow_headers:
      - "Content-Type"
      - "Authorization"

  # 前端配置
  frontend:
    host: "0.0.0.0"
    port: 3000

# gRPC服务配置
grpc:
  host: "0.0.0.0"
  port: 50051
  max_workers: 10
  timeout: 30

# 产品型号配置
products:
  default_model: "product_a"
  models:
    - code: "product_a"
      name: "产品A"
      feature_lib: "product_a.bin"
      threshold: 0.5
    - code: "product_b"
      name: "产品B"
      feature_lib: "product_b.bin"
      threshold: 0.5
